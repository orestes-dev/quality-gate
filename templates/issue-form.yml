name: Task
description: A well-scoped, actionable task.
title: "[Task]: "
body:
  - type: markdown
    attributes:
      value: |
        Fill in every field. A structural quality gate runs automatically and
        will flag issues that are missing context, acceptance criteria, or that
        are too large to land as one issue.
  - type: textarea
    id: context
    attributes:
      label: Context
      description: >-
        What needs to happen and why. Enough for someone with no prior context
        to understand the goal.
      placeholder: >-
        The X page loads all records on mount, which is slow for large accounts.
        We want it to paginate so the initial load stays fast.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: >-
        A markdown checklist of verifiable outcomes. At least one item. Each
        item should be objectively checkable.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: >-
        Explicit non-goals. What this task deliberately does NOT include. Forces
        the work down to a single slice.
      placeholder: >-
        - Redesigning the page layout
        - Changing the underlying data model
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      description: >-
        Estimated size. L and XL are too big to land as one issue; split them
        into smaller issues.
      options:
        - XS
        - S
        - M
        - L
        - XL
    validations:
      required: true
