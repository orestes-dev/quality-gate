name: Issue Quality Gate
description: >-
  Deterministic quality gate for GitHub issues. Applies a single
  issue-quality:failing/warning/pass label and
  posts/updates an explanatory scorecard comment.
author: Orestes Carracedo
runs:
  using: composite
  steps:
    - name: Validate issue
      shell: bash
      run: node "$GITHUB_ACTION_PATH/src/action.js"
      env:
        GITHUB_TOKEN: ${{ github.token }}
